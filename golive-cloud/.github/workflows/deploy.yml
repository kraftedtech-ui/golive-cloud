name: Deploy to GoLive Cloud Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 65.108.124.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/golive-cloud
            git pull origin main
            npm install --production
            npm run build
            pm2 restart golive-cloud
            pm2 save
            echo "✅ GoLive Cloud deployed at $(date)"
