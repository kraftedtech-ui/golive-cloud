name: Deploy to GoLive Cloud Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 65.108.124.35 >> ~/.ssh/known_hosts

      - name: Write deploy script
        run: |
          cat > /tmp/deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          echo "=== GoLive Deploy ==="
          cd /www/wwwroot/golive-cloud
          # Remove any accidentally nested golive-cloud folder
          rm -rf /www/wwwroot/golive-cloud/golive-cloud
          git config --global --add safe.directory /www/wwwroot/golive-cloud
          git remote remove origin 2>/dev/null || true
          git remote add origin https://github.com/kraftedtech-ui/golive-cloud.git
          git fetch origin main
          echo "=== Pulling files from GitHub ==="
          git show origin/main:tsconfig.json > tsconfig.json
          git show origin/main:middleware.ts > middleware.ts
          git show origin/main:next.config.ts > next.config.ts
          git show origin/main:package.json > package.json
          git show origin/main:server.js > server.js
          git show origin/main:postcss.config.mjs > postcss.config.mjs
          git show origin/main:app/globals.css > app/globals.css
          git show origin/main:app/layout.tsx > app/layout.tsx
          git show origin/main:app/SessionWrapper.tsx > app/SessionWrapper.tsx
          git show origin/main:app/page.tsx > app/page.tsx
          mkdir -p app/discovery
          git show origin/main:app/discovery/page.tsx > app/discovery/page.tsx
          git show origin/main:app/portal/login/page.tsx > app/portal/login/page.tsx
          git show origin/main:app/portal/page.tsx > app/portal/page.tsx
          mkdir -p app/migrate
          git show origin/main:app/migrate/page.tsx > app/migrate/page.tsx
          git show origin/main:app/migrate/MigrateClient.tsx > app/migrate/MigrateClient.tsx

          # NOTE: app/assess/[ref] was removed from the pull list — both
          # page.tsx and AssessClient.tsx are committed as empty (0-byte)
          # files on origin/main (an abandoned, never-linked feature), and
          # Next.js now hard-fails the build on an empty page.tsx ("is not
          # a module"). The directory is also deleted below to clear out
          # the stale empty copy already on this server from earlier pulls.
          rm -rf "app/assess"
          mkdir -p app/terms
          git show origin/main:app/terms/page.tsx > app/terms/page.tsx
          mkdir -p app/privacy
          git show origin/main:app/privacy/page.tsx > app/privacy/page.tsx
          git show origin/main:lib/mongodb.ts > lib/mongodb.ts
          git show origin/main:lib/email.ts > lib/email.ts
          git show origin/main:lib/utils.ts > lib/utils.ts
          git show origin/main:lib/data.ts > lib/data.ts
          git show origin/main:lib/currency.ts > lib/currency.ts
          git show origin/main:lib/auth.ts > lib/auth.ts
          git show origin/main:lib/apiAuth.ts > lib/apiAuth.ts
          git show origin/main:lib/exchangeRates.ts > lib/exchangeRates.ts
          git show origin/main:models/Lead.ts > models/Lead.ts
          git show origin/main:models/Notification.ts > models/Notification.ts
          git show origin/main:models/Customer.ts > models/Customer.ts
          git show origin/main:models/Announcement.ts > models/Announcement.ts
          git show origin/main:models/KnowledgeArticle.ts > models/KnowledgeArticle.ts
          git show origin/main:models/CommissionRule.ts > models/CommissionRule.ts
          git show origin/main:models/CertificationCatalog.ts > models/CertificationCatalog.ts
          git show origin/main:models/CertificationRecord.ts > models/CertificationRecord.ts
          git show origin/main:models/User.ts > models/User.ts
          git show origin/main:models/EmailOTP.ts > models/EmailOTP.ts
          git show origin/main:models/ExchangeRate.ts > models/ExchangeRate.ts
          git show origin/main:models/PricingCatalog.ts > models/PricingCatalog.ts
          git show origin/main:models/ProductMapping.ts > models/ProductMapping.ts
          git show origin/main:models/DiscoveryAssessment.ts > models/DiscoveryAssessment.ts
          git show origin/main:lib/pricelistParser.ts > lib/pricelistParser.ts
          git show origin/main:lib/suspensionRisk.ts > lib/suspensionRisk.ts
          git show origin/main:lib/publicProductData.ts > lib/publicProductData.ts
          git show origin/main:lib/discoveryRecommendation.ts > lib/discoveryRecommendation.ts
          git show origin/main:lib/publicVerification.ts > lib/publicVerification.ts
          git show "origin/main:app/api/auth/[...nextauth]/route.ts" > "app/api/auth/[...nextauth]/route.ts"
          mkdir -p "app/api/auth/check-2fa" "app/api/2fa/setup" "app/api/2fa/confirm"
          git show "origin/main:app/api/auth/check-2fa/route.ts" > "app/api/auth/check-2fa/route.ts"
          git show "origin/main:app/api/2fa/setup/route.ts" > "app/api/2fa/setup/route.ts"
          git show "origin/main:app/api/2fa/confirm/route.ts" > "app/api/2fa/confirm/route.ts"
          mkdir -p "app/api/2fa/reset" "app/api/2fa/reset/confirm"
          git show "origin/main:app/api/2fa/reset/route.ts" > "app/api/2fa/reset/route.ts"
          git show "origin/main:app/api/2fa/reset/confirm/route.ts" > "app/api/2fa/reset/confirm/route.ts"
          git show origin/main:app/api/leads/route.ts > app/api/leads/route.ts
          mkdir -p app/api/verify-email "app/api/verify-email/check"
          git show origin/main:app/api/verify-email/route.ts > app/api/verify-email/route.ts
          git show "origin/main:app/api/verify-email/check/route.ts" > "app/api/verify-email/check/route.ts"
          git show "origin/main:app/api/leads/[id]/route.ts" > "app/api/leads/[id]/route.ts"
          mkdir -p "app/api/leads/[id]/assign"
          git show "origin/main:app/api/leads/[id]/assign/route.ts" > "app/api/leads/[id]/assign/route.ts"
          mkdir -p "app/api/customers/[id]"
          git show origin/main:app/api/customers/route.ts > app/api/customers/route.ts
          git show "origin/main:app/api/customers/[id]/route.ts" > "app/api/customers/[id]/route.ts"
          mkdir -p "app/api/customers/[id]/agreement"
          git show "origin/main:app/api/customers/[id]/agreement/route.ts" > "app/api/customers/[id]/agreement/route.ts"
          mkdir -p "app/api/customers/[id]/payment-confirm"
          git show "origin/main:app/api/customers/[id]/payment-confirm/route.ts" > "app/api/customers/[id]/payment-confirm/route.ts"
          mkdir -p app/api/exchange-rates
          git show origin/main:app/api/exchange-rates/route.ts > app/api/exchange-rates/route.ts
          mkdir -p "app/api/users/[id]"
          git show origin/main:app/api/users/route.ts > app/api/users/route.ts
          mkdir -p app/api/account
          git show origin/main:app/api/account/route.ts > app/api/account/route.ts
          git show "origin/main:app/api/users/[id]/route.ts" > "app/api/users/[id]/route.ts"
          mkdir -p app/api/milestones
          git show origin/main:app/api/milestones/route.ts > app/api/milestones/route.ts
          mkdir -p app/api/transfers
          git show origin/main:app/api/transfers/route.ts > app/api/transfers/route.ts
          mkdir -p app/api/announcements "app/api/announcements/[id]"
          git show origin/main:app/api/announcements/route.ts > app/api/announcements/route.ts
          git show "origin/main:app/api/announcements/[id]/route.ts" > "app/api/announcements/[id]/route.ts"
          mkdir -p app/api/notifications
          git show origin/main:app/api/notifications/route.ts > app/api/notifications/route.ts
          mkdir -p app/api/knowledge "app/api/knowledge/[id]"
          git show origin/main:app/api/knowledge/route.ts > app/api/knowledge/route.ts
          git show "origin/main:app/api/knowledge/[id]/route.ts" > "app/api/knowledge/[id]/route.ts"
          mkdir -p app/api/commission-rules "app/api/commission-rules/[id]"
          git show origin/main:app/api/commission-rules/route.ts > app/api/commission-rules/route.ts
          git show "origin/main:app/api/commission-rules/[id]/route.ts" > "app/api/commission-rules/[id]/route.ts"

          mkdir -p app/api/certification-catalog "app/api/certification-catalog/[id]" app/api/certification-records "app/api/certification-records/[id]"
          git show origin/main:app/api/certification-catalog/route.ts > app/api/certification-catalog/route.ts
          git show "origin/main:app/api/certification-catalog/[id]/route.ts" > "app/api/certification-catalog/[id]/route.ts"
          git show origin/main:app/api/certification-records/route.ts > app/api/certification-records/route.ts
          git show "origin/main:app/api/certification-records/[id]/route.ts" > "app/api/certification-records/[id]/route.ts"

          mkdir -p app/api/pricing-catalog "app/api/pricing-catalog/[id]" app/api/pricing-catalog/import
          git show origin/main:app/api/pricing-catalog/route.ts > app/api/pricing-catalog/route.ts
          git show "origin/main:app/api/pricing-catalog/[id]/route.ts" > "app/api/pricing-catalog/[id]/route.ts"
          git show origin/main:app/api/pricing-catalog/import/route.ts > app/api/pricing-catalog/import/route.ts

          mkdir -p app/api/product-mappings "app/api/product-mappings/[id]"
          git show origin/main:app/api/product-mappings/route.ts > app/api/product-mappings/route.ts
          git show "origin/main:app/api/product-mappings/[id]/route.ts" > "app/api/product-mappings/[id]/route.ts"

          mkdir -p app/api/discovery-assessments "app/api/discovery-assessments/[id]"
          git show origin/main:app/api/discovery-assessments/route.ts > app/api/discovery-assessments/route.ts
          git show "origin/main:app/api/discovery-assessments/[id]/route.ts" > "app/api/discovery-assessments/[id]/route.ts"
          mkdir -p app/api/discovery-assessments/public
          git show origin/main:app/api/discovery-assessments/public/route.ts > app/api/discovery-assessments/public/route.ts

          # NOTE: app/api/public/lead-assessment/route.ts was removed here —
          # that path was never actually committed to the repo (confirmed
          # against a fresh clone), so pulling it unconditionally broke every
          # deploy past this point. If this route is meant to exist, it needs
          # to be built and committed first, then re-added here.
          mkdir -p public/images
          git show origin/main:public/images/ndpr-badge.png > public/images/ndpr-badge.png
          git show origin/main:public/images/logo-dark.png > public/images/logo-dark.png
          git show origin/main:public/favicon.ico > public/favicon.ico
          git show origin/main:public/favicon-16x16.png > public/favicon-16x16.png
          git show origin/main:public/favicon-32x32.png > public/favicon-32x32.png
          git show origin/main:public/apple-touch-icon.png > public/apple-touch-icon.png
          git show origin/main:public/icon-192x192.png > public/icon-192x192.png
          git show origin/main:public/icon-512x512.png > public/icon-512x512.png
          git show origin/main:public/site.webmanifest > public/site.webmanifest
          git show origin/main:public/certification-guide.html > public/certification-guide.html
          mkdir -p components
          git show origin/main:components/assessment-form.tsx > components/assessment-form.tsx
          git show origin/main:components/assessment-section.tsx > components/assessment-section.tsx
          git show origin/main:components/public-discovery-form.tsx > components/public-discovery-form.tsx
          git show origin/main:components/cta-link.tsx > components/cta-link.tsx
          git show origin/main:components/currency-context.tsx > components/currency-context.tsx
          git show origin/main:components/footer.tsx > components/footer.tsx
          git show origin/main:components/hero.tsx > components/hero.tsx
          git show origin/main:components/markets.tsx > components/markets.tsx
          git show origin/main:components/migration.tsx > components/migration.tsx
          git show origin/main:components/navbar.tsx > components/navbar.tsx
          git show origin/main:components/packages.tsx > components/packages.tsx
          git show origin/main:components/trust-bar.tsx > components/trust-bar.tsx
          git show origin/main:components/verticals.tsx > components/verticals.tsx
          mkdir -p components/legal
          git show origin/main:components/legal/navbar.tsx > components/legal/navbar.tsx
          git show origin/main:components/legal/logo.tsx > components/legal/logo.tsx
          git show origin/main:components/legal/footer.tsx > components/legal/footer.tsx
          git show origin/main:components/legal/primitives.tsx > components/legal/primitives.tsx
          git show origin/main:components/legal/rights-grid.tsx > components/legal/rights-grid.tsx
          git show origin/main:components/legal/table-of-contents.tsx > components/legal/table-of-contents.tsx
          git show origin/main:components/legal/privacy-content.tsx > components/legal/privacy-content.tsx
          git show origin/main:components/legal/terms-content.tsx > components/legal/terms-content.tsx
          mkdir -p components/dashboard
          git show origin/main:components/dashboard/sidebar.tsx > components/dashboard/sidebar.tsx
          git show origin/main:components/dashboard/topbar.tsx > components/dashboard/topbar.tsx
          git show origin/main:components/dashboard/stat-cards.tsx > components/dashboard/stat-cards.tsx
          git show origin/main:components/dashboard/kanban-board.tsx > components/dashboard/kanban-board.tsx
          git show origin/main:components/dashboard/recent-leads.tsx > components/dashboard/recent-leads.tsx
          git show origin/main:components/dashboard/mrr-charts.tsx > components/dashboard/mrr-charts.tsx
          git show origin/main:components/dashboard/CommissionDashboard.tsx > components/dashboard/CommissionDashboard.tsx
          git show origin/main:components/dashboard/SkuMarginPicker.tsx > components/dashboard/SkuMarginPicker.tsx
          git show origin/main:components/dashboard/CertificationBonusPanel.tsx > components/dashboard/CertificationBonusPanel.tsx
          git show origin/main:components/dashboard/AnnouncementsPanel.tsx > components/dashboard/AnnouncementsPanel.tsx
          git show origin/main:components/dashboard/KnowledgeBase.tsx > components/dashboard/KnowledgeBase.tsx
          git show origin/main:components/dashboard/LeadAssign.tsx > components/dashboard/LeadAssign.tsx
          git show origin/main:components/dashboard/TransferAssign.tsx > components/dashboard/TransferAssign.tsx
          git show origin/main:components/dashboard/AccountSettings.tsx > components/dashboard/AccountSettings.tsx
          git show origin/main:components/dashboard/PricingCatalogAdmin.tsx > components/dashboard/PricingCatalogAdmin.tsx
          git show origin/main:components/dashboard/ProductMappingAdmin.tsx > components/dashboard/ProductMappingAdmin.tsx
          git show origin/main:components/dashboard/PaymentRiskPanel.tsx > components/dashboard/PaymentRiskPanel.tsx
          git show origin/main:components/dashboard/DiscoveryAssessmentTool.tsx > components/dashboard/DiscoveryAssessmentTool.tsx
          mkdir -p components/ui
          git show origin/main:components/ui/card.tsx > components/ui/card.tsx
          git show origin/main:components/ui/button.tsx > components/ui/button.tsx
          git show origin/main:components/ui/table.tsx > components/ui/table.tsx
          git show origin/main:components/ui/select.tsx > components/ui/select.tsx
          git show origin/main:components/ui/chart.tsx > components/ui/chart.tsx
          echo "=== Installing ==="
          npm install --legacy-peer-deps
          echo "=== Building ==="
          pkill -f "next dev" 2>/dev/null || true
          pkill -f "next build" 2>/dev/null || true
          sleep 2
          rm -rf .next
          export NODE_ENV=production
          npm run build
          echo "=== Restarting server ==="
          kill $(ps aux | grep "server.js" | grep -v grep | awk '{print $2}') 2>/dev/null || true
          sleep 3
          su -s /bin/bash www -c "pm2 restart golive-cloud"
          sleep 3
          kill $(ps aux | grep "server.js" | grep root | awk '{print $2}') 2>/dev/null || true
          su -s /bin/bash www -c "pm2 save"
          echo "=== Deployed at $(date) ==="
          SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Copy deploy script to server
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/deploy.sh root@65.108.124.35:/tmp/deploy.sh

      - name: Run deploy script on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20 root@65.108.124.35 "bash /tmp/deploy.sh"
