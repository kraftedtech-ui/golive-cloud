name: Deploy to GoLive Cloud Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 65.108.124.35 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@65.108.124.35 << 'ENDSSH'
            set -e
            git config --global --add safe.directory /www/wwwroot/golive-cloud
            cd /www/wwwroot/golive-cloud
            git remote remove origin 2>/dev/null || true
            git remote add origin https://github.com/kraftedtech-ui/golive-cloud.git
            git fetch origin main
            git reset --hard origin/main
            npm install --legacy-peer-deps
            pkill -f "next dev" 2>/dev/null || true
            NODE_ENV=production npm run build
            pm2 restart golive-cloud || pm2 start /www/wwwroot/golive-cloud/server.js --name golive-cloud --cwd /www/wwwroot/golive-cloud
            pm2 save
            echo "✅ Deployed at $(date)"
ENDSSH
